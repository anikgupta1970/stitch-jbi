name: Notify Downstream on Release

on:
  workflow_dispatch:
    inputs:
      jbi_version:
        description: 'JBI version to push downstream'
        required: true
        default: '2.0.138'
  push:
    tags:
      - 'v*'

jobs:
  trigger-downstream:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - stitch-processing
          - stitch-workflow

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.jbi_version }}" ]; then
            echo "VERSION=${{ inputs.jbi_version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Trigger downstream repo update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOWNSTREAM_PAT }}
          repository: anikgupta1970/${{ matrix.repo }}
          event-type: jbi-version-upgrade
          client-payload: '{"jbi_version": "${{ steps.version.outputs.VERSION }}"}'
