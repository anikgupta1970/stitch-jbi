# .github/workflows/notify-downstream.yml (in stitch-jbi repo)
name: Notify Downstream on Release

on:
  push:
    tags:
      - 'v*'

jobs:
  trigger-downstream:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - stitch-processing
          - stitch-workflow
          # add more downstream repos here
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Trigger downstream repo update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOWNSTREAM_PAT }}
          repository: spliceforms-stitch/${{ matrix.repo }}
          event-type: jbi-version-upgrade
          client-payload: |
            {
              "jbi_version": "${{ steps.version.outputs.VERSION }}"
            }
